name: secret-lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hardcoded-secrets:
    name: reject hardcoded API keys
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: scan diff for API key patterns
        run: |
          PATTERNS='sk-or-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{40,}|AIza[A-Za-z0-9_-]{35,}|xkeysib-[A-Za-z0-9_-]{40,}|xsmtpsib-[A-Za-z0-9_-]{40,}|ant-api01-[A-Za-z0-9_-]{40,}|gsk_[A-Za-z0-9]{40,}|xai-[A-Za-z0-9_-]{40,}|[A-Za-z0-9+/]{86}=='

          git diff HEAD~1..HEAD -- . \
            ':!.env.example' \
            ':!**/*.test.*' \
            ':!**/fixtures/**' \
          | grep '^+' \
          | grep -vE '^\+\+\+' \
          | grep -E "$PATTERNS" && {
            echo "FAIL: hardcoded API key found in diff. Rotate the exposed key and store via env vars."
            exit 1
          } || echo "OK: no hardcoded API keys detected in diff"

      - name: check ecosystem.config.js for plaintext secrets
        run: |
          if [ ! -f ecosystem.config.js ]; then
            echo "OK: ecosystem.config.js not present"
            exit 0
          fi

          PATTERNS='sk-or-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{40,}|AIza[A-Za-z0-9_-]{35,}|xkeysib-[A-Za-z0-9_-]{40,}|xsmtpsib-[A-Za-z0-9_-]{40,}|ant-api01-[A-Za-z0-9_-]{40,}|gsk_[A-Za-z0-9]{40,}|xai-[A-Za-z0-9_-]{40,}'

          grep -E "$PATTERNS" ecosystem.config.js && {
            echo "FAIL: plaintext secret found in ecosystem.config.js. Move secrets to .env and reference via process.env.X"
            exit 1
          } || echo "OK: ecosystem.config.js contains no plaintext secrets"
