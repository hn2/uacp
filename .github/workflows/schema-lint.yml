name: Schema Lint

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  schema-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Schema version consistency
        run: node scripts/schema-lint.js
