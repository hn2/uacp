name: README Guard

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  readme-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: README version consistency
        run: node scripts/check-readme-version.js
