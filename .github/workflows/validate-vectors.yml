name: Validate Test Vectors

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate all test vectors
        run: node validate.js

      - name: Resource limits tests
        run: node --test test/resource-limits.test.js

      - name: Harness self-test
        run: node conformance/harness/run.js
